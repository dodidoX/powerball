      font-family: Arial, sans-serif;

      border: 1px solid #ccc;
      text-align: center;
      padding: 6px;
    }
    th { background: #f2f2f2; font-weight: 700; }
    tr:nth-child(even) { background: #f8f8f8; }
    tr:hover { background: #e6e6e6; }

    /*  1) Number buttons / options */
    .numpadding { padding: 0 20px; }
    .number-buttons{
      display: grid;
      grid-template-columns: repeat(10, 1fr); /* ✅ 1행 10개 */
      gap: 4px;                               /* ✅ 약간 넓혀서 가독성 */
    }

    /* 공통 버튼(기본) */
    .number-buttons .number-button{
      background: #000;
      border: 1px solid #6f6f6f;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;      /* ✅ 조금 축소 */
      padding: 6px 0;       /* ✅ 높이 축소 */
      line-height: 1;
    }

    .option-container {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 5px 0 0 20px;
      flex-wrap: wrap; /* PC에서도 줄바꿈 가능하게 */
    }

    /* 2) Compare toggle button */
    #toggleCompare {
      transition: all 0.25s;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      outline: none;
      border-radius: 6px;
    }
    #toggleCompare.on {
      background: #4CAF50;
      color: #fff;
      box-shadow: inset 0 4px 8px rgba(0,0,0,.35);
    }
    #toggleCompare.off {
      color: #000;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
      transform: translateY(-1px);
      background: #fff;
    }
    .tooltip-leftalign .tooltip-inner { text-align: left; }

    /*  3) HistoryTable  */
    #historyTable th:last-child,
    #historyTable td:last-child {
      padding: 4px 6px;
      white-space: nowrap;
      width: 72px;

    #historyTable thead th:nth-child(2) {

      padding: 4px 6px;

    #historyTable .deleteBtn {

      font-size: 12px;
      line-height: 1.1;
      height: 24px;
      border-radius: 4px;
    }
    #selectAllHistory { cursor: pointer; }

    #historyTable td,
    #historyTable th {
      height: 6px;
      min-height: 5px;
    }
    #historyTable { margin: 12px 0; }

  <style>
    .num-ball{
      display:inline-flex;
      align-items:center;
      justify-content:center;

      width: 26px;
      height: 26px;
      border-radius: 50%;

      font-weight: 800;
      font-size: 13px;

      /* 기본은 WhiteBall */

      border: 1px solid #cfcfcf; /* 음영 테두리 느낌 */
      box-shadow: inset 0 2px 4px rgba(0,0,0,.18),
                  0 1px 2px rgba(0,0,0,.10);

      /* 기존 효과 제거 */
      background-image: none !important;
      filter: none !important;
      text-shadow: none !important;
      -webkit-text-stroke: 0 !important;
    }

    /* PowerBall 전용 */
    .num-ball.power{
      background: #c9151e !important; /* 빨강 */
      color: #fff !important;         /* 흰 글자 */
      border: 0 !important;           /* 테두리 없음 */
      box-shadow: none !important;    /* 음영 없음 */
    }

    .numpadding > button[type="button"]{
      margin-top: 10px;
    }

    .number-buttons { user-select: none; -webkit-user-select: none; }
    .number-button { touch-action: none; }

    /* 모바일 */
    @media (max-width: 576px){
      .num-ball{
        width: 22px;
        height: 22px;
        font-size: 12px;
      }
    }

    @media (max-width: 576px){

      #powerball .number-buttons{
        grid-template-columns: repeat(13, 1fr) !important; /* ✅ 폭 더 줄이기 */

      }
      #powerball .number-buttons .number-button{
        font-size: 12px !important;
        padding: 4px 0 !important;
        border-radius: 6px !important;
      }
    }

                                  <script>

                                  function percentToFactor(input) {
                                  let s = (input || "").toString().trim();
                                  if (s.endsWith("%")) s = s.slice(0, -1);
                                  let n = parseFloat(s);
                                  if (!Number.isFinite(n)) return 1;              
                                  n = Math.max(0, Math.min(1500, n));            
                                  return n / 100;                                  
                                }


                                function normalizePercentText(el) {
                                  let s = (el.value || "").toString().trim();
                                  if (s === "") { el.value = ""; return; }
                                  if (s.endsWith("%")) s = s.slice(0, -1);
                                  let n = parseFloat(s);
                                  if (!Number.isFinite(n)) n = 0;
                                  n = Math.max(0, Math.min(1500, n));

                                  el.value = n + "%";
                                }

                                  const NUM_MIN = 1, NUM_MAX = 69;
                                  function parseNumList(str) {
                                    if (!str) return [];
                                    return Array.from(
                                      new Set(
                                        str.split(",")
                                          .map(s => s.trim())
                                          .filter(s => s !== "")
                                          .map(n => Number(n))
                                          .filter(n => Number.isInteger(n) && n >= NUM_MIN && n <= NUM_MAX)
                                      )
                                    ).sort((a,b)=>a-b);
                                  }


                                  function consecutiveLabel(nums) {
                                    let maxRun = 1, run = 1;
                                    for (let i = 0; i < nums.length - 1; i++) {
                                      if (nums[i] + 1 === nums[i + 1]) { run++; maxRun = Math.max(maxRun, run); }
                                      else run = 1;
                                    }
                                    return maxRun >= 3 ? `${maxRun}연번` : "";
                                  }
                                  function statsOf(nums) {
                                    const sum = nums.reduce((a, b) => a + b, 0);
                                    const mean = sum / nums.length;
                                    const variance = nums.reduce((acc, v) => acc + (v - mean) * (v - mean), 0) / nums.length;
                                    const std = Math.sqrt(variance);
                                    const odd = nums.filter(n => n % 2 === 1).length;
                                    const even = nums.length - odd;
                                    return { sum, std: Number(std.toFixed(2)), odd, even };
                                  }
                                  function inRange(val, lo, hi) {
                                    if (!Number.isFinite(val) || !Number.isFinite(lo) || !Number.isFinite(hi)) return "";
                                    return (val >= lo && val <= hi) ? "추천" : "";
                                  }



                                  function byId(id){ return document.getElementById(id); }

                                  function ensureHistDT() {
                                    if (!window.jQuery || !$.fn || !$.fn.dataTable) return null;

                                    // 정렬 플러그인(첫번째~여섯번째)
                                    if (!$.fn.dataTable.ext.order['num-ball']) {
                                      $.fn.dataTable.ext.order['num-ball'] = function (settings, col) {
                                        return this.api()
                                          .column(col, { order: 'index' })
                                          .nodes()
                                          .map(td => {
                                            const el = td.querySelector('.num-ball');
                                            const t = el ? el.textContent : td.textContent;
                                            const m = String(t).match(/\d+/);
                                            const n = m ? parseInt(m[0], 10) : 0;
                                            return Number.isFinite(n) ? n : 0;
                                          })
                                          .toArray();
                                      };
                                    }

                                    if ($.fn.DataTable.isDataTable('#historyTable')) {
                                      return $('#historyTable').DataTable();
                                    }

                                    histDT = $('#historyTable').DataTable({
                                      dom: 't',
                                      paging: false,
                                      info: false,
                                      destroy: true,
                                      searching: false,
                                      lengthChange: false,
                                      autoWidth: false,
                                      language: { emptyTable: "생성된 번호가 없습니다." },
                                      order: [],
                                      aLengthMenu: [[-1], ["All"]],
                                      iDisplayLength: -1,
                                      columnDefs: [

                                        { targets: [0, 9, 10, 11, 12], type: 'num' },
                                        { targets: [13, 14], visible: false },

                                        {
                                          targets: [2,3,4,5,6,7],
                                          orderDataType: 'num-ball',
                                          render: function (data, type) {
                                            if (type === 'filter' || type === 'search') {
                                              const m = String(data).match(/\d+/);
                                              return m ? m[0] : '';
                                            }
                                            return data;
                                          }
                                        },

                                        // 체크/대조5칸/삭제 버튼은 정렬 비활성
                                        { targets: [1, 15,16,17,18,19, 20], orderable: false }
                                      ]
                                    });

                                    return histDT;
                                  }




                                  let includedInput, excludedInput, weightedInput, weightValueInput;
                                  let sumMinInput, sumMaxInput, stdMinInput, stdMaxInput;
                                  let numberButtons, includeCheck, excludeCheck, weightedCheck, resetButton;
                                  let generatedTbl, generatedTbody, histTbl, histTbody, pickSelects;
                                  let histDT = null;

                                  let pbIncludedInput, pbExcludedInput, pbWeightedInput;

                                  function parsePBList(str){
                                    if(!str) return [];
                                    return Array.from(new Set(
                                      str.split(",").map(s=>s.trim()).filter(Boolean).map(Number)
                                        .filter(n=>Number.isInteger(n) && n>=1 && n<=26)
                                    )).sort((a,b)=>a-b);
                                  }

                                  function applyPBNumber(n, mode){
                                    const inc = parsePBList(pbIncludedInput.value);
                                    const exc = parsePBList(pbExcludedInput.value);
                                    const wgt = parsePBList(pbWeightedInput.value);

                                    function toggle(list){
                                      const set = new Set(list);
                                      if (set.has(n)) set.delete(n); else set.add(n);
                                      return Array.from(set).sort((a,b)=>a-b).join(", ");
                                    }

                                    if (mode === "include") {
                                      pbExcludedInput.value = exc.filter(x => x !== n).join(", ");
                                      pbWeightedInput.value = wgt.filter(x => x !== n).join(", ");
                                      pbIncludedInput.value = toggle(inc);
                                    } else if (mode === "exclude") {
                                      pbIncludedInput.value = inc.filter(x => x !== n).join(", ");
                                      pbWeightedInput.value = wgt.filter(x => x !== n).join(", ");
                                      pbExcludedInput.value = toggle(exc);
                                    } else if (mode === "weight") {
                                      pbIncludedInput.value = inc.filter(x => x !== n).join(", ");
                                      pbExcludedInput.value = exc.filter(x => x !== n).join(", ");
                                      pbWeightedInput.value = toggle(wgt);
                                    }
                                  }

                                  let historySeq = 1;


                                  function paintButtons() {
                                    if (!numberButtons) return;
                                    const include = parseNumList(includedInput.value);
                                    const exclude = parseNumList(excludedInput.value);
                                    const weight  = parseNumList(weightedInput.value);

                                    numberButtons.forEach((btn, idx) => {
                                      const number = idx + 1;
                                      let bg = "black";
                                      if (include.includes(number)) bg = "green";
                                      else if (weight.includes(number)) bg = "blue";
                                      else if (exclude.includes(number)) bg = "red";
                                      btn.style.backgroundColor = bg;
                                      btn.style.borderColor = "gray";
                                    });
                                  }


                                  function attachButtonHandlers(mode) {
                                    if (!numberButtons) return;

                                    numberButtons.forEach(btn => { btn.replaceWith(btn.cloneNode(true)); });

                                    numberButtons = document.querySelectorAll("#pickCard .number-button");

                                    numberButtons.forEach(btn => {
                                      btn.addEventListener("click", () => {
                                        const n = Number(btn.textContent);
                                        if (!Number.isFinite(n)) return;

                                        if (!mode) return; // 모드(include/exclude/weight) 없으면 클릭 무시(원하면 여기서 기본 include로 처리도 가능)

                                        applyWBNumber(n, mode);      // ✅ 클릭 토글 로직은 여기로 통일
                                        paintButtons();
                                        compareInputWithTable();
                                      });
                                    });
                                  }

                                  function updateHistory(numbers, powerball, sum, consecutive, stddev, oddCount, evenCount, sumRec, stddevRec) {
                                    const dt = ensureHistDT();
                                    if (!dt) return;
                                    
                                    const compareCols = 5; // 69C5
                                    const newRowData = [
                                      historySeq++,                                 // 0 No.
                                      '<input type="checkbox" class="row-select">', // 1
                                      ...numbers.map(n => ballHTML(n, "white")),    // 2~6 (5개)
                                      ballHTML(powerball, "power"),                 // 7 (Power)
                                      consecutive,                                  // 8
                                      sum,                                          // 9
                                      stddev,                                       // 10
                                      oddCount,                                     // 11
                                      evenCount,                                    // 12
                                      sumRec,                                       // 13
                                      stddevRec,                                    // 14
                                      ...Array(compareCols).fill(''),               // 15~19
                                      '<button class="deleteBtn" type="button">삭제</button>', // 20
                                    ];

                                    const row = dt.row.add(newRowData).draw(false).node();

                                    $(row).find('button.deleteBtn').on('click', function(e){
                                      e.preventDefault();
                                      e.stopPropagation();
                                      const y = window.pageYOffset || document.documentElement.scrollTop;
                                      dt.row($(this).closest('tr')).remove().draw(false);

                                      if (dt.rows().count() === 0) {
                                        historySeq = 1;
                                        const selectAll = document.getElementById('selectAllHistory');
                                        if (selectAll) selectAll.checked = false;
                                        dt.order([]).search('').columns().search('').draw(false);
                                      }

                                      window.scrollTo(0, y);
                                      compareInputWithTable();
                                    });
                                  }

                                  function deleteHistory() {
                                    const dt = ensureHistDT();
                                    dt.clear().draw(false);


                                    historySeq = 1;


                                    const selectAll = document.getElementById('selectAllHistory');
                                    if (selectAll) selectAll.checked = false;


                                    dt.order([]).search('').columns().search('').draw();
                                  }


                                  let isCompareFunctionOn = false;
                                  function toggleCompareFunction() {
                                    isCompareFunctionOn = !isCompareFunctionOn;
                                    const btn = byId('toggleCompare');
                                    if (isCompareFunctionOn) {
                                      btn.innerText = "포함 확인 On";
                                      btn.classList.remove('off'); btn.classList.add('on');
                                      compareInputWithTable();
                                    } else {
                                      btn.innerText = "포함 확인 Off";
                                      btn.classList.remove('on'); btn.classList.add('off');
                                      resetCompareIndicators();
                                    }
                                  }



                                  function resetCompareIndicators() {
                                    const dt = ensureHistDT();
                                    dt.rows().every(function(){
                                      const row = this.node();
                                      for (let j=15; j<=19; j++) row.children[j].innerText = "";
                                    });
                                  }
                                  function compareInputWithTable() {
                                    if (!isCompareFunctionOn) return;
                                    const dt = ensureHistDT();
                                    const picks = pickSelects.map(sel => Number(sel.value));
                                    dt.rows().every(function() {
                                      const row = this.node();
                                      const cells = row.getElementsByTagName('td');
                                      const rowNums = Array.from({ length: 5 }, (_, i) => {
                                        const ball = cells[2 + i].querySelector('.num-ball');
                                        return ball ? Number(ball.textContent) : Number(cells[2 + i].textContent);
                                      });
                                      picks.forEach((pick, idx) => {
                                        const col = 15 + idx;
                                        cells[col].innerText = rowNums.includes(pick) ? "O" : "";
                                      });
                                    });
                                  }

                                    
                                    function makeBall(num, kind = "white"){
                                      const ball = document.createElement("span");
                                      ball.classList.add("num-ball");
                                      if (kind === "power") ball.classList.add("power");
                                      ball.textContent = num;
                                      return ball;
                                    }

                                    function ballHTML(num, kind = "white"){
                                      const cls = (kind === "power") ? "num-ball power" : "num-ball";
                                      return `<span class="${cls}">${num}</span>`;
                                    }

                                    async function generateNewNumbers() {
                                      // 1) 입력값 수집
                                      const include = parseNumList(byId("included").value);
                                      const exclude = parseNumList(byId("excluded").value);
                                      const weighted = parseNumList(byId("weighted").value);
                                      const weightPercent = (function () {
                                        let s = (byId("weightValueWB").value || "").trim();
                                        if (s.endsWith("%")) s = s.slice(0, -1);
                                        const n = parseFloat(s);
                                        if (!Number.isFinite(n)) return 100;
                                        return Math.max(0, Math.min(1500, n));
                                      })();

                                      // Power Ball 입력 수집(프론트는 "입력만" 관리)
                                      const pbInclude = parseNumList(byId("pb_included").value).filter(n => n>=1 && n<=26);
                                      const pbExclude = parseNumList(byId("pb_excluded").value).filter(n => n>=1 && n<=26);
                                      const pbWeighted = parseNumList(byId("pb_weighted").value).filter(n => n>=1 && n<=26);

                                      const pbWeightPercent = (function () {
                                        let s = (byId("weightValuePB").value || "").trim();
                                        if (s.endsWith("%")) s = s.slice(0, -1);
                                        const n = parseFloat(s);
                                        if (!Number.isFinite(n)) return 100;
                                        return Math.max(0, Math.min(1500, n));
                                      })();

                                      const sumMin = parseFloat(byId("sum_range_min").value);
                                      const sumMax = parseFloat(byId("sum_range_max").value);
                                      const stdMin = parseFloat(byId("stddev_range_min").value);
                                      const stdMax = parseFloat(byId("stddev_range_max").value);

                                      // 2) 서버 호출
                                      let res;
                                      try {
                                        res = await fetch("/api/generate", {
                                          method: "POST",
                                          headers: { "Content-Type": "application/json" },
                                          body: JSON.stringify({
                                            include, exclude, weighted,
                                            weightPercent,
                                            // ✅ PB도 서버로 전송
                                            pbInclude, pbExclude, pbWeighted,
                                            pbWeightPercent,
                                            count: 5,
                                            sumMin, sumMax, stdMin, stdMax
                                          })
                                        });
                                      } catch (e) {
                                        alert("서버 연결 실패: " + e);
                                        return;
                                      }

                                      let data;
                                      try { data = await res.json(); } catch { data = {}; }
                                      if (!res.ok || !data.ok) {
                                        alert("생성 실패: " + (data.error || res.status));
                                        return;
                                      }


                                      if (!generatedTbody) return;
                                      generatedTbody.innerHTML = ""; 

                                      for (let i = 0; i < data.results.length; i++) {
                                        const r = data.results[i];

                                        const nums = r.numbers.slice().sort((a, b) => a - b);

                                        // ✅ 서버는 power 라는 키로 내려줌
                                        const powerball = Number(r.power);

                                        const cons = consecutiveLabel(nums);
                                        const st = statsOf(nums);
                                        const sumRec = inRange(st.sum, sumMin, sumMax);
                                        const stddevRec = inRange(st.std, stdMin, stdMax);

                                        const tr = document.createElement("tr");
                                        tr.innerHTML = `
                                          <td>조합 ${i + 1}</td>
                                          ${nums.map(() => `<td class="num-cell"></td>`).join("")}
                                          <td class="pb-cell"></td>
                                          <td>${cons}</td>
                                          <td>${st.sum}</td>
                                          <td>${st.std.toFixed(2)}</td>
                                          <td class="gen-extra">${st.odd}</td>
                                          <td class="gen-extra">${st.even}</td>
                                          <td class="gen-extra">${sumRec}</td>
                                          <td class="gen-extra">${stddevRec}</td>
                                        `;
                                        generatedTbody.appendChild(tr);

                                        // ✅ White 5개 채우기
                                        const tds = tr.querySelectorAll("td.num-cell");
                                        tds.forEach((td, idx) => td.appendChild(makeBall(nums[idx], "white")));

                                        // ✅ PowerBall 1개 채우기
                                        const pbTd = tr.querySelector("td.pb-cell");
                                        if (pbTd) pbTd.appendChild(makeBall(powerball, "power"));

                                        // ✅ history에도 powerball 포함해서 넣기 (인자 순서 중요)
                                        updateHistory(
                                          nums,
                                          powerball,
                                          st.sum,
                                          cons,
                                          st.std.toFixed(2),
                                          st.odd,
                                          st.even,
                                          sumRec,
                                          stddevRec
                                        );
                                      }

                                      paintButtons();
                                      compareInputWithTable();
                                    }


                                  function saveCombinations(){
                                    if (!generatedTbody) return;
                                    const dt = ensureHistDT();
                                    const existing = new Set(
                                      dt.rows().data().toArray().map(r => r.slice(2, 8).join(','))
                                    );
                                    generatedTbody.querySelectorAll('tr').forEach(tr => {
                                      const tds = tr.querySelectorAll('td');
                                      if (tds.length < 14) return;
                                      const nums = Array.from({length:6}, (_,i)=> Number(tds[i+1].textContent));
                                      const key = nums.join(',');
                                      if (existing.has(key)) return; 
                                      const cons = tds[7].textContent;
                                      const sum  = Number(tds[8].textContent);
                                      const std  = tds[9].textContent;
                                      const odd  = Number(tds[10].textContent);
                                      const even = Number(tds[11].textContent);
                                      const sumRec = tds[12].textContent;
                                      const stdRec = tds[13].textContent;
                                      updateHistory(nums, powerball, sum, cons, std, odd, even, sumRec, stdRec);
                                      existing.add(key);
                                    });
                                  }

//

                                  function setPickCollapseDefault(){
                                    const isMobile = window.matchMedia("(max-width: 576px)").matches;

                                    const wb = document.getElementById("pickCollapseWB");
                                    const pb = document.getElementById("pickCollapsePB");
                                    if (!wb || !pb) return;

                                    const wbHeader = document.querySelector('[data-target="#pickCollapseWB"]');
                                    const pbHeader = document.querySelector('[data-target="#pickCollapsePB"]');

                                    if (isMobile) {
                                      wb.classList.remove("show");
                                      pb.classList.remove("show");
                                      if (wbHeader) wbHeader.setAttribute("aria-expanded", "false");
                                      if (pbHeader) pbHeader.setAttribute("aria-expanded", "false");
                                    } else {
                                      wb.classList.add("show");
                                      pb.classList.add("show");
                                      if (wbHeader) wbHeader.setAttribute("aria-expanded", "true");
                                      if (pbHeader) pbHeader.setAttribute("aria-expanded", "true");
                                    }
                                  }

                                  function applyWBNumber(n, mode){
                                    const inc = parseNumList(includedInput.value);
                                    const exc = parseNumList(excludedInput.value);
                                    const wgt = parseNumList(weightedInput.value);

                              async function exportTableToExcel(filename) {
                                const dt = ensureHistDT();
                                const table = document.getElementById('historyTable');
                                const workbook = new ExcelJS.Workbook();
                                const ws = workbook.addWorksheet('전체');


                                const headerCells = table.tHead.rows[0].cells;
                                const includeCols = [];
                                const deleteColIndex = headerCells.length - 1;
                                for (let c = 0; c < headerCells.length; c++) {
                                  if (c === deleteColIndex) continue; 
                                  includeCols.push(c);
                                }


                                const selVals = [];
                                for (let k = 1; k <= 6; k++) {
                                  const sel = document.getElementById(`number-input${k}`);
                                  selVals[k] = sel ? sel.value : '';
                                }
                                includeCols.forEach((c, i) => {
                                  let label = headerCells[c].innerText.trim();

                                  if (c >= 15 && c <= 20) {
                                    const idx = c - 14; 
                                    label = selVals[idx] ? `대조(${selVals[idx]})` : `대조`;
                                  }
                                  else if (!label && headerCells[c].querySelector('input[type="checkbox"]')) {
                                    label = '선택';
                                  }

                                  ws.getCell(1, i + 1).value = label || '';
                                });


                                let r = 2;
                                dt.rows().every(function () {
                                  const cells = this.node().cells;
                                  includeCols.forEach((c, i) => {
                                    const excelCell = ws.getCell(r, i + 1);

                                    const text = (cells[c].innerText || '').trim();
                                    if (text === '') {
                                      excelCell.value = null;
                                    } else if (!isNaN(text)) {
                                      excelCell.value = parseFloat(text);
                                    } else {
                                      excelCell.value = text;
                                    }
                                  });
                                  r++;
                                });



                                
                                ws.getColumn(2).hidden = true;


                                const firstRow = 1;
                                const lastRow  = r - 1;              
                                const firstCol = 1;
                                const lastCol  = includeCols.length; 


                                function setEdge(cell, edge, style = 'thin') {
                                  const b = cell.border || {};
                                  cell.border = { ...b, [edge]: { style } };
                                }

                                if (lastRow >= firstRow && lastCol >= firstCol) {

                                  for (let c = firstCol; c <= lastCol; c++) {
                                    setEdge(ws.getCell(firstRow, c), 'top');
                                    setEdge(ws.getCell(lastRow,  c), 'bottom');
                                  }

                                  for (let rr = firstRow; rr <= lastRow; rr++) {
                                    setEdge(ws.getCell(rr, firstCol), 'left');
                                    setEdge(ws.getCell(rr, lastCol),  'right');
                                  }


                                  for (let c = firstCol; c <= lastCol; c++) {
                                    setEdge(ws.getCell(1, c), 'bottom'); 
                                  }


                                  for (let rr = firstRow; rr <= lastRow; rr++) {
                                    setEdge(ws.getCell(rr, 1), 'right');
                                  }


                                  const colRight8 = 8;
                                  if (colRight8 >= firstCol && colRight8 <= lastCol) {
                                    for (let rr = firstRow; rr <= lastRow; rr++) {
                                      setEdge(ws.getCell(rr, colRight8), 'right');
                                    }
                                  }


                                  const colRight15 = 15;
                                  if (colRight15 >= firstCol && colRight15 <= lastCol) {
                                    for (let rr = firstRow; rr <= lastRow; rr++) {
                                      setEdge(ws.getCell(rr, colRight15), 'right');
                                    }
                                  }
                                }

                                ws.views = [{ state: 'frozen', ySplit: 1, topLeftCell: 'A2', activeCell: 'A2' }];

                                const buffer = await workbook.xlsx.writeBuffer();
                                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                                const link = document.createElement('a');
                                link.href = URL.createObjectURL(blob);
                                link.download = filename;
                                link.click();
                              }


                              function deleteSelectedRows() {

                                const y = window.pageYOffset || document.documentElement.scrollTop;


                                dt.rows(function (_idx, _data, node) {
                                  const cb = node.querySelector('.row-select');
                                  return cb && cb.checked;
                                }).remove().draw(false);

                                if (dt.rows().count() === 0) {
                                  historySeq = 1;

                                  const selectAll = document.getElementById('selectAllHistory');
                                  if (selectAll) selectAll.checked = false;
                                }

                                window.scrollTo(0, y);
                                compareInputWithTable();
                              }
