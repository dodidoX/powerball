                                <script>

                                const API_BASE = "/.netlify/functions/count_numbers";

                                let CACHE = null;
                                let MIN_ROUND = 1;
                                let MAX_ROUND = 1;


                                /* 드롭다운 채우기 */
                                function setSelectOptions(selectEl, min, max) {

                                    selectEl.innerHTML = "";

                                    for (let i = min; i <= max; i++) {

                                        const opt = document.createElement("option");

                                        opt.value = i;
                                        opt.textContent = i;

                                        selectEl.appendChild(opt);

                                    }

                                }

                                async function fetchNumbers(start, end) {

                                    const url = `${API_BASE}?start=${start}&end=${end}`;

                                    const res = await fetch(url, { cache: "no-store" });

                                    if (!res.ok)
                                        throw new Error(`fetch failed: ${res.status}`);

                                    return await res.json();

                                }


                                function calculateStats(numbersArray, includeBonus) {

                                    const counts = Array(45).fill(0);

                                    for (const item of numbersArray) {

                                        for (let i = 1; i <= 6; i++) {

                                            const num = parseInt(item[`number${i}`]);

                                            if (num >= 1 && num <= 45)
                                                counts[num - 1]++;

                                        }

                                        if (includeBonus) {

                                            const b = parseInt(item.bonus);

                                            if (b >= 1 && b <= 45)
                                                counts[b - 1]++;

                                        }

                                    }

                                    return counts.map((count, index) => ({
                                        number: index + 1,
                                        count
                                    }))
                                    .sort((a, b) => b.count - a.count);

                                }


                                function addRanks(stats) {

                                    let prevCount = -1;
                                    let prevRank = 0;

                                    return stats.map((row, i) => {

                                        if (row.count === prevCount)
                                            row.rank = prevRank;

                                        else {

                                            row.rank = i + 1;
                                            prevRank = row.rank;
                                            prevCount = row.count;

                                        }

                                        return row;

                                    });

                                }


                                function renderTable(statsNoBonus, statsBonus) {
                                const table = document.getElementById("stats");

                                if ($.fn.DataTable.isDataTable("#stats")) {
                                    $("#stats").DataTable().clear().destroy();
                                }

                                table.innerHTML = "";

                                const thead = document.createElement("thead");
                                const tbody = document.createElement("tbody");

                                const headers = [
                                    "번호",
                                    "출현 횟수(보너스 미포함)",
                                    "순위",
                                    "출현 횟수(보너스 포함)",
                                    "순위"
                                ];

                                const trHead = document.createElement("tr");
                                headers.forEach(h => {
                                    const th = document.createElement("th");
                                    th.textContent = h;
                                    trHead.appendChild(th);
                                });
                                thead.appendChild(trHead);

                                const mapA = new Map(statsNoBonus.map(x => [x.number, x]));
                                const mapB = new Map(statsBonus.map(x => [x.number, x]));

                                for (let i = 1; i <= 45; i++) {
                                    const a = mapA.get(i);
                                    const b = mapB.get(i);

                                    let ballClass;
                                    if (i <= 10) ballClass = "ball-yellow";
                                    else if (i <= 20) ballClass = "ball-blue";
                                    else if (i <= 30) ballClass = "ball-red";
                                    else if (i <= 40) ballClass = "ball-gray";
                                    else ballClass = "ball-green";

                                    const tr = document.createElement("tr");
                                    tr.innerHTML = `
                                    <td><span class="num-ball ${ballClass}">${i}</span></td>
                                    <td>${a.count}</td>
                                    <td>${a.rank}</td>
                                    <td>${b.count}</td>
                                    <td>${b.rank}</td>
                                    `;
                                    tbody.appendChild(tr);
                                }

                                table.appendChild(thead);
                                table.appendChild(tbody);

                                $("#stats").DataTable({
                                    paging: false,
                                    searching: false,
                                    info: false,
                                    order: [],
                                    autoWidth: false  
                                });
                                }


                                async function runQuery() {

                                    const start = parseInt(
                                        document.getElementById("round_range_start").value
                                    );

                                    const end = parseInt(
                                        document.getElementById("round_range_end").value
                                    );

                                    const data = await fetchNumbers(start, end);

                                    const numbers = data.numbers;

                                    const statsA = addRanks(
                                        calculateStats(numbers, false)
                                    );

                                    const statsB = addRanks(
                                        calculateStats(numbers, true)
                                    );

                                    renderTable(statsA, statsB);

                                }


                                async function init() {

                                    const data = await fetchNumbers(1, 999999);

                                    MIN_ROUND = data.meta.minRound;
                                    MAX_ROUND = data.meta.maxRound;

                                    const startSel =
                                        document.getElementById("round_range_start");

                                    const endSel =
                                        document.getElementById("round_range_end");

                                    setSelectOptions(startSel, MIN_ROUND, MAX_ROUND);
                                    setSelectOptions(endSel, MIN_ROUND, MAX_ROUND);

                                    startSel.value = MIN_ROUND;
                                    endSel.value = MAX_ROUND;

                                    await runQuery();

                                }


                                document.addEventListener("DOMContentLoaded", init);

                                document
                                .getElementById("calculateStatsButton")
                                .addEventListener("click", runQuery);

                                </script>

                        <script>
                        /* =========================================================
                        PICK UI (ddRange/ddMode/ddIncludeBonus/ddPickN) 전용 로직
                        - "조건 적용" 클릭 시
                            1) 회차 범위 계산
                            2) fetchNumbers(start,end) 호출
                            3) calculateStats(numbers, includeBonus)로 빈도 집계
                            4) 최다/최소 기준으로 상위/하위 N개를 "동률 포함"해서 누적 추출
                            5) 순위 순으로 콤마 출력 (동순위면 숫자 작은 것부터)
                        ========================================================= */

                        // ✅ 최근 N회차 → start/end 계산 (전회차 포함)
                        function getStartEndByRecent(maxRound, rangeValue) {
                        if (rangeValue === "all") {
                            return { start: MIN_ROUND, end: MAX_ROUND };
                        }
                        const n = parseInt(rangeValue, 10);
                        const end = maxRound;
                        const start = Math.max(MIN_ROUND, end - n + 1);
                        return { start, end };
                        }

                        // ✅ 출력 유틸 (input/div 모두 대응)
                        function setPickOutput(text) {
                        const out = document.getElementById("pickOutput");
                        if (!out) return;

                        const tag = (out.tagName || "").toUpperCase();
                        if (tag === "INPUT" || tag === "TEXTAREA") out.value = text;
                        else out.textContent = text;
                        }

                        // ✅ mode("max"=최다, "min"=최소)에 맞춰 정렬
                        //    - 1차: count (max는 내림차순, min은 오름차순)
                        //    - 2차: number 오름차순 (동순위에서 작은 숫자가 먼저)
                        function orderStatsForPick(stats, mode) {
                        const arr = (stats || []).slice();
                        if (mode === "min") {
                            arr.sort((a, b) => (a.count - b.count) || (a.number - b.number));
                        } else {
                            arr.sort((a, b) => (b.count - a.count) || (a.number - b.number));
                        }
                        return arr;
                        }

                        // ✅ 상위/하위 n개를 "동률 포함"으로 누적해서 뽑기
                        //    - n번째 지점에서 동률이면 그 동률 그룹 전체 포함 → 결과는 n개 이상 가능
                        function pickNWithTies(orderedStats, n) {
                        const out = [];
                        let i = 0;

                        while (i < orderedStats.length && out.length < n) {
                            const c = orderedStats[i].count;

                            // 같은 count(=동순위) 그룹 모으기
                            const group = [];
                            while (i < orderedStats.length && orderedStats[i].count === c) {
                            group.push(orderedStats[i].number);
                            i++;
                            }

                            group.sort((a, b) => a - b); // 동순위는 숫자 오름차순
                            out.push(...group);          // ✅ 컷에서 동률이면 그룹 통째로 포함
                        }

                        return out;
                        }

                        // ✅ 버튼 클릭 시 실행
                        async function runPick() {
                        try {
                            const rangeValue  = document.getElementById("ddRange")?.value || "100";
                            const modeValue   = document.getElementById("ddMode")?.value || "max";            // max|min
                            const targetValue = document.getElementById("ddIncludeBonus")?.value || "win";    // win|win_bonus
                            const pickNValue  = document.getElementById("ddPickN")?.value || "30";            // 1~30

                            const includeBonus = (targetValue === "win_bonus");
                            const n = Math.max(1, Math.min(30, parseInt(pickNValue, 10) || 30));

                            // init()에서 MIN_ROUND/MAX_ROUND는 이미 세팅되어 있어야 정상
                            // (네 기존 init()이 fetchNumbers(1,999999)로 meta 받아서 세팅하므로 OK)
                            const { start, end } = getStartEndByRecent(MAX_ROUND, rangeValue);

                            setPickOutput("불러오는 중...");

                            const data = await fetchNumbers(start, end);
                            const numbers = data.numbers || [];

                            // 빈도 계산 (네 기존 calculateStats 재사용)
                            const statsRaw = calculateStats(numbers, includeBonus);

                            // ✅ 최다/최소 기준 정렬(동순위 숫자 오름차순)
                            const ordered = orderStatsForPick(statsRaw, modeValue);

                            // ✅ N개(동률 포함) 누적 추출
                            const pickedNums = pickNWithTies(ordered, n);

                            if (!pickedNums.length) {
                            setPickOutput("결과 없음");
                            return;
                            }

                            // ✅ 순위 순(=ordered 그룹 순) + 동순위 숫자 오름차순 상태 유지
                            setPickOutput(pickedNums.join(", "));
                        } catch (err) {
                            setPickOutput(`오류: ${String(err)}`);
                        }
                        }

                        // ✅ 이벤트 연결
                        document.addEventListener("DOMContentLoaded", () => {
                        const btn = document.getElementById("btnApplyPick");
                        if (btn) btn.addEventListener("click", runPick);
                        });
                        </script>
