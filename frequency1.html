                                <script>

                                const API_BASE = "/.netlify/functions/count_numbers";

                                let CACHE = null;
                                let MIN_ROUND = 1;
                                let MAX_ROUND = 1;


                                /* 드롭다운 채우기 */
                                function setSelectOptions(selectEl, min, max) {

                                    selectEl.innerHTML = "";

                                    for (let i = min; i <= max; i++) {

                                        const opt = document.createElement("option");

                                        opt.value = i;
                                        opt.textContent = i;

                                        selectEl.appendChild(opt);

                                    }

                                }

                                async function fetchNumbers(start, end) {

                                    const url = `${API_BASE}?start=${start}&end=${end}`;

                                    const res = await fetch(url, { cache: "no-store" });

                                    if (!res.ok)
                                        throw new Error(`fetch failed: ${res.status}`);

                                    return await res.json();

                                }


                                function calculateStats(numbersArray, includeBonus) {

                                    const counts = Array(45).fill(0);

                                    for (const item of numbersArray) {

                                        for (let i = 1; i <= 6; i++) {

                                            const num = parseInt(item[`number${i}`]);

                                            if (num >= 1 && num <= 45)
                                                counts[num - 1]++;

                                        }

                                        if (includeBonus) {

                                            const b = parseInt(item.bonus);

                                            if (b >= 1 && b <= 45)
                                                counts[b - 1]++;

                                        }

                                    }

                                    return counts.map((count, index) => ({
                                        number: index + 1,
                                        count
                                    }))
                                    .sort((a, b) => b.count - a.count);

                                }


                                function addRanks(stats) {

                                    let prevCount = -1;
                                    let prevRank = 0;

                                    return stats.map((row, i) => {

                                        if (row.count === prevCount)
                                            row.rank = prevRank;

                                        else {

                                            row.rank = i + 1;
                                            prevRank = row.rank;
                                            prevCount = row.count;

                                        }

                                        return row;

                                    });

                                }


                                function renderTable(statsNoBonus, statsBonus) {
                                const table = document.getElementById("stats");

                                if ($.fn.DataTable.isDataTable("#stats")) {
                                    $("#stats").DataTable().clear().destroy();
                                }

                                table.innerHTML = "";

                                const thead = document.createElement("thead");
                                const tbody = document.createElement("tbody");

                                const headers = [
                                    "번호",
                                    "출현 횟수(보너스 미포함)",
                                    "순위",
                                    "출현 횟수(보너스 포함)",
                                    "순위"
                                ];

                                const trHead = document.createElement("tr");
                                headers.forEach(h => {
                                    const th = document.createElement("th");
                                    th.textContent = h;
                                    trHead.appendChild(th);
                                });
                                thead.appendChild(trHead);

                                const mapA = new Map(statsNoBonus.map(x => [x.number, x]));
                                const mapB = new Map(statsBonus.map(x => [x.number, x]));

                                for (let i = 1; i <= 45; i++) {
                                    const a = mapA.get(i);
                                    const b = mapB.get(i);

                                    let ballClass;
                                    if (i <= 10) ballClass = "ball-yellow";
                                    else if (i <= 20) ballClass = "ball-blue";
                                    else if (i <= 30) ballClass = "ball-red";
                                    else if (i <= 40) ballClass = "ball-gray";
                                    else ballClass = "ball-green";

                                    const tr = document.createElement("tr");
                                    tr.innerHTML = `
                                    <td><span class="num-ball ${ballClass}">${i}</span></td>
                                    <td>${a.count}</td>
                                    <td>${a.rank}</td>
                                    <td>${b.count}</td>
                                    <td>${b.rank}</td>
                                    `;
                                    tbody.appendChild(tr);
                                }

                                table.appendChild(thead);
                                table.appendChild(tbody);

                                $("#stats").DataTable({
                                    paging: false,
                                    searching: false,
                                    info: false,
                                    order: [],
                                    autoWidth: false  
                                });
                                }


                                async function runQuery() {

                                    const start = parseInt(
                                        document.getElementById("round_range_start").value
                                    );

                                    const end = parseInt(
                                        document.getElementById("round_range_end").value
                                    );

                                    const data = await fetchNumbers(start, end);

                                    const numbers = data.numbers;

                                    const statsA = addRanks(
                                        calculateStats(numbers, false)
                                    );

                                    const statsB = addRanks(
                                        calculateStats(numbers, true)
                                    );

                                    renderTable(statsA, statsB);

                                }


                                async function init() {

                                    const data = await fetchNumbers(1, 999999);

                                    MIN_ROUND = data.meta.minRound;
                                    MAX_ROUND = data.meta.maxRound;

                                    const startSel =
                                        document.getElementById("round_range_start");

                                    const endSel =
                                        document.getElementById("round_range_end");

                                    setSelectOptions(startSel, MIN_ROUND, MAX_ROUND);
                                    setSelectOptions(endSel, MIN_ROUND, MAX_ROUND);

                                    startSel.value = MIN_ROUND;
                                    endSel.value = MAX_ROUND;

                                    await runQuery();

                                }


                                document.addEventListener("DOMContentLoaded", init);

                                document
                                .getElementById("calculateStatsButton")
                                .addEventListener("click", runQuery);

                                </script>

                        <script>
                        // 1) 최근 N회차 → start/end 계산
                        function getStartEndByRecent(maxRound, rangeValue) {
                            if (rangeValue === "all") {
                            return { start: MIN_ROUND, end: MAX_ROUND };
                            }
                            const n = parseInt(rangeValue, 10);
                            const end = maxRound;
                            const start = Math.max(MIN_ROUND, end - n + 1);
                            return { start, end };
                        }

                        // 2) 최다/최소(동률 포함) 번호 뽑기
                        function pickNumbersByMode(stats, mode /* "max" | "min" */) {
                            if (!stats || stats.length === 0) return [];

                            const targetCount = (mode === "max")
                            ? stats[0].count
                            : stats[stats.length - 1].count;

                            // 동률 포함해서 number만 추출
                            return stats
                            .filter(x => x.count === targetCount)
                            .map(x => x.number)
                            .sort((a, b) => a - b); // 출력은 오름차순이 보기 좋음
                        }

                        // 3) 출력 유틸
                        function setPickOutput(text) {
                            const out = document.getElementById("pickOutput");
                            if (!out) return;

                            if (out.tagName === "INPUT" || out.tagName === "TEXTAREA") {
                            out.value = text;
                            } else {
                            out.textContent = text;
                            }
                        }

                        // "조건 적용" 버튼 이벤트
                        async function runPick() {
                            try {
                            const rangeValue = document.getElementById("ddRange")?.value || "100";
                            const modeValue = document.getElementById("ddMode")?.value || "max"; // max|min
                            const targetValue = document.getElementById("ddIncludeBonus")?.value || "win"; // win|win_bonus

                            const includeBonus = (targetValue === "win_bonus");

                            const { start, end } = getStartEndByRecent(MAX_ROUND, rangeValue);

                            setPickOutput("불러오는 중...");

                            const data = await fetchNumbers(start, end);
                            const numbers = data.numbers || [];

                            const stats = calculateStats(numbers, includeBonus); // 빈도 내림차순 정렬
                            const picked = pickNumbersByMode(stats, modeValue);

                            if (picked.length === 0) {
                                setPickOutput("결과 없음");
                                return;
                            }

                            // 콤마로 출력
                            setPickOutput(picked.join(", "));
                            } catch (err) {
                            setPickOutput(`오류: ${String(err)}`);
                            }
                        }

                        document.addEventListener("DOMContentLoaded", () => {
                            const btn = document.getElementById("btnApplyPick");
                            if (btn) btn.addEventListener("click", runPick);
                        });
                        </script>
