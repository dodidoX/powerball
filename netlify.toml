[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18" 

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/data/*.json"]