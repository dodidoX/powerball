                            <script>
                            const API_BASE = "/.netlify/functions/get_numbers";

                            /* ===== 색 유틸 ===== */
                            function hexToRgb(hex){
                            const h = hex.replace("#","").trim();
                            const full = h.length === 3 ? h.split("").map(ch=>ch+ch).join("") : h;
                            const n = parseInt(full, 16);
                            return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
                            }
                            function lerp(a,b,t){ return a + (b-a)*t; }
                            function mixRgb(c1, c2, t){
                            return {
                                r: Math.round(lerp(c1.r, c2.r, t)),
                                g: Math.round(lerp(c1.g, c2.g, t)),
                                b: Math.round(lerp(c1.b, c2.b, t))
                            };
                            }
                            function rgbToCss(c){ return `rgb(${c.r},${c.g},${c.b})`; }
                            function luminance(c){
                            return (0.2126*c.r + 0.7152*c.g + 0.0722*c.b) / 255;
                            }

                            const GRAD_END = "#14B8A6";
                            const END_RGB = hexToRgb(GRAD_END);
                            const WHITE = {r:255,g:255,b:255};

                            /* ✅ 여기만 핵심: DataTables 없이 테이블만 렌더 */
                            function renderCooccurTable(matrix) {
                            const table = document.getElementById("cooccur");
                            if (!table) return;

                            // 1) 기존 내용 싹 비우기
                            table.innerHTML = "";

                            // 2) thead/tbody 만들기
                            const thead = document.createElement("thead");
                            const tbody = document.createElement("tbody");

                            // 3) 헤더 행
                            const trHead = document.createElement("tr");
                            const thCorner = document.createElement("th");
                            thCorner.innerHTML = "동반출현번호→<br><span class='corner-sub'>/번호↓</span>";
                            trHead.appendChild(thCorner);

                            for (let c = 1; c <= 45; c++) {
                                const th = document.createElement("th");
                                th.textContent = c;
                                trHead.appendChild(th);
                            }
                            thead.appendChild(trHead);

                            // 4) 바디(46x46)
                            for (let r = 1; r <= 45; r++) {

                                // 행별 min/max (대각선 제외)
                                const vals = [];
                                for (let c = 1; c <= 45; c++) {
                                if (c === r) continue;
                                vals.push(Number(matrix?.[r]?.[c] ?? 0));
                                }
                                let rowMin = Math.min(...vals);
                                let rowMax = Math.max(...vals);
                                if (!Number.isFinite(rowMin)) rowMin = 0;
                                if (!Number.isFinite(rowMax)) rowMax = 0;

                                const denom = (rowMax - rowMin) || 1;

                                const tr = document.createElement("tr");

                                // 왼쪽 행 헤더(고정될 th)
                                const thRow = document.createElement("th");
                                thRow.textContent = r;
                                tr.appendChild(thRow);

                                // 데이터 셀
                                for (let c = 1; c <= 45; c++) {
                                const td = document.createElement("td");
                                const v = Number(matrix?.[r]?.[c] ?? 0);
                                td.textContent = v;

                                if (c === r) {
                                    td.classList.add("diag-cell"); // 대각선 회색
                                } else {
                                    // 그라데이션
                                    const t = Math.max(0, Math.min(1, (v - rowMin) / denom));
                                    const bgRgb = mixRgb(WHITE, END_RGB, t);
                                    td.style.backgroundColor = rgbToCss(bgRgb);

                                    // 글자색 자동
                                    const lum = luminance(bgRgb);
                                    td.style.color = (lum < 0.55) ? "#FFFFFF" : "#111827";
                                    if (t > 0.85) td.style.fontWeight = "700";
                                }

                                tr.appendChild(td);
                                }

                                tbody.appendChild(tr);
                            }

                            // 5) 테이블에 붙이기
                            table.appendChild(thead);
                            table.appendChild(tbody);
                            }

                            /* ===== 아래 함수들은 기존 그대로 ===== */
                            function setSelectOptions(selectEl, min, max) {
                            selectEl.innerHTML = "";
                            for (let i = min; i <= max; i++) {
                                const opt = document.createElement("option");
                                opt.value = String(i);
                                opt.textContent = String(i);
                                selectEl.appendChild(opt);
                            }
                            }

                            async function fetchMatrix(start, end) {
                            const url = `${API_BASE}?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
                            const res = await fetch(url, { cache: "no-store" });
                            if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
                            return await res.json(); // { meta, matrix }
                            }

                            function clampAndSwap(s, e, minRound, maxRound) {
                            let start = parseInt(s, 10);
                            let end = parseInt(e, 10);

                            if (!Number.isFinite(start)) start = minRound;
                            if (!Number.isFinite(end)) end = maxRound;

                            if (start < minRound) start = minRound;
                            if (start > maxRound) start = maxRound;

                            if (end < minRound) end = minRound;
                            if (end > maxRound) end = maxRound;

                            if (end < start) [start, end] = [end, start];
                            return { start, end };
                            }

                            async function initRoundSelectorsAndTable() {
                            const startSel = document.getElementById("round_range_start");
                            const endSel = document.getElementById("round_range_end");
                            const btn = document.getElementById("calculateStatsButton");
                            if (!startSel || !endSel || !btn) return;

                            try {
                                const initData = await fetchMatrix(1, 9999999);
                                const { meta, matrix } = initData;

                                const minRound = meta.minRound;
                                const maxRound = meta.maxRound;

                                setSelectOptions(startSel, minRound, maxRound);
                                setSelectOptions(endSel, minRound, maxRound);

                                startSel.value = String(minRound);
                                endSel.value = String(maxRound);

                                renderCooccurTable(matrix);

                                btn.addEventListener("click", async () => {
                                const range = clampAndSwap(startSel.value, endSel.value, minRound, maxRound);
                                startSel.value = String(range.start);
                                endSel.value = String(range.end);

                                btn.disabled = true;
                                const originalText = btn.textContent;
                                btn.textContent = "조회중...";

                                try {
                                    const data = await fetchMatrix(range.start, range.end);
                                    renderCooccurTable(data.matrix);
                                } catch (err) {
                                    console.error(err);
                                    alert("조회 실패: " + err.message);
                                } finally {
                                    btn.disabled = false;
                                    btn.textContent = originalText;
                                }
                                });

                            } catch (err) {
                                console.error(err);
                                alert("초기화 실패: " + err.message);
                            }
                            }

                            document.addEventListener("DOMContentLoaded", initRoundSelectorsAndTable);
                            </script>
