                            <script>
                            const API_BASE = "/.netlify/functions/coincidence";

                            let CURRENT_MATRIX = null;   
                            let ACTIVE_RANK = 0;      


                            function hexToRgb(hex){
                            const h = hex.replace("#","").trim();
                            const full = h.length === 3 ? h.split("").map(ch=>ch+ch).join("") : h;
                            const n = parseInt(full, 16);
                            return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
                            }
                            function lerp(a,b,t){ return a + (b-a)*t; }
                            function mixRgb(c1, c2, t){
                            return {
                                r: Math.round(lerp(c1.r, c2.r, t)),
                                g: Math.round(lerp(c1.g, c2.g, t)),
                                b: Math.round(lerp(c1.b, c2.b, t))
                            };
                            }
                            function rgbToCss(c){ return `rgb(${c.r},${c.g},${c.b})`; }
                            function luminance(c){
                            return (0.2126*c.r + 0.7152*c.g + 0.0722*c.b) / 255;
                            }

                            const GRAD_END = "#14B8A6";
                            const END_RGB = hexToRgb(GRAD_END);
                            const WHITE = {r:255,g:255,b:255};

                            function renderCooccurTable(matrix) {
                            const table = document.getElementById("cooccur");
                            if (!table) return;

                            table.innerHTML = "";

                            const thead = document.createElement("thead");
                            const tbody = document.createElement("tbody");

                            const trHead = document.createElement("tr");
                            const thCorner = document.createElement("th");
                            thCorner.innerHTML = "동반출현번호→<br><span class='corner-sub'>/번호↓</span>";
                            trHead.appendChild(thCorner);

                            for (let c = 1; c <= 45; c++) {
                                const th = document.createElement("th");
                                th.textContent = c;
                                trHead.appendChild(th);
                            }
                            thead.appendChild(trHead);

                            for (let r = 1; r <= 45; r++) {

                                const vals = [];
                                for (let c = 1; c <= 45; c++) {
                                if (c === r) continue;
                                vals.push(Number(matrix?.[r]?.[c] ?? 0));
                                }
                                let rowMin = Math.min(...vals);
                                let rowMax = Math.max(...vals);
                                if (!Number.isFinite(rowMin)) rowMin = 0;
                                if (!Number.isFinite(rowMax)) rowMax = 0;

                                const denom = (rowMax - rowMin) || 1;

                                const tr = document.createElement("tr");

                                const thRow = document.createElement("th");
                                thRow.textContent = r;
                                tr.appendChild(thRow);

                                for (let c = 1; c <= 45; c++) {
                                const td = document.createElement("td");
                                const v = Number(matrix?.[r]?.[c] ?? 0);
                                td.textContent = v;

                                if (c === r) {
                                    td.classList.add("diag-cell"); 
                                } else {
                                    const t = Math.max(0, Math.min(1, (v - rowMin) / denom));
                                    const bgRgb = mixRgb(WHITE, END_RGB, t);
                                    td.style.backgroundColor = rgbToCss(bgRgb);

                                    const lum = luminance(bgRgb);
                                    td.style.color = (lum < 0.55) ? "#FFFFFF" : "#111827";
                                    if (t > 0.85) td.style.fontWeight = "700";
                                }

                                tr.appendChild(td);
                                }

                                tbody.appendChild(tr);
                            }

                            table.appendChild(thead);
                            table.appendChild(tbody);

                            CURRENT_MATRIX = matrix;   
                            applyRankFilter();  
                            attachCooccurInteractions();
                            }

                            function setSelectOptions(selectEl, min, max) {
                            selectEl.innerHTML = "";
                            for (let i = min; i <= max; i++) {
                                const opt = document.createElement("option");
                                opt.value = String(i);
                                opt.textContent = String(i);
                                selectEl.appendChild(opt);
//
                            }
                            }

                            async function fetchMatrix(start, end) {
                            const url = `${API_BASE}?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
                            const res = await fetch(url, { cache: "no-store" });
                            if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
                            return await res.json(); 
                            }

                            function clampAndSwap(s, e, minRound, maxRound) {
                            let start = parseInt(s, 10);
                            let end = parseInt(e, 10);

                            if (!Number.isFinite(start)) start = minRound;
                            if (!Number.isFinite(end)) end = maxRound;

                            if (start < minRound) start = minRound;
                            if (start > maxRound) start = maxRound;

                            if (end < minRound) end = minRound;
                            if (end > maxRound) end = maxRound;

                            if (end < start) [start, end] = [end, start];
                            return { start, end };
                            }

                            async function initRoundSelectorsAndTable() {
                            const startSel = document.getElementById("round_range_start");
                            const endSel = document.getElementById("round_range_end");
                            const btn = document.getElementById("calculateStatsButton");
                            if (!startSel || !endSel || !btn) return;

                            try {
                                const initData = await fetchMatrix(1, 9999999);
                                const { meta, matrix } = initData;

                                const minRound = meta.minRound;
                                const maxRound = meta.maxRound;

                                setSelectOptions(startSel, minRound, maxRound);
                                setSelectOptions(endSel, minRound, maxRound);

                                startSel.value = String(minRound);
                                endSel.value = String(maxRound);

                                renderCooccurTable(matrix);
                                attachCooccurInteractions();

                                btn.addEventListener("click", async () => {
                                const range = clampAndSwap(startSel.value, endSel.value, minRound, maxRound);
                                startSel.value = String(range.start);
                                endSel.value = String(range.end);

                                btn.disabled = true;
                                const originalText = btn.textContent;
                                btn.textContent = "조회중...";

                                try {
                                    const data = await fetchMatrix(range.start, range.end);
                                    renderCooccurTable(data.matrix);
                                } catch (err) {
                                    console.error(err);
                                    alert("조회 실패: " + err.message);
                                } finally {
                                    btn.disabled = false;
                                    btn.textContent = originalText;
                                }
                                });

                            } catch (err) {
                                console.error(err);
                                alert("초기화 실패: " + err.message);
                            }
                            }

                            document.addEventListener("DOMContentLoaded", () => {
                            initRoundSelectorsAndTable();
                            initRankButtons();
                            });

                            function clearCooccurSelection(){
                            const table = document.getElementById("cooccur");
                            if (!table) return;

                            table.querySelectorAll(".is-selected").forEach(el => el.classList.remove("is-selected"));
                            table.querySelectorAll("tr.is-row-active").forEach(el => el.classList.remove("is-row-active"));
                            table.querySelectorAll("td.is-col-active").forEach(el => el.classList.remove("is-col-active"));
                            table.querySelectorAll("th.is-col-header-active").forEach(el => el.classList.remove("is-col-header-active"));
                            table.querySelectorAll("th.is-row-header-active").forEach(el => el.classList.remove("is-row-header-active"));
                            }


                            let COOCCUR_BOUND = false;

                            function getBallClass(n){
                                if (n <= 10) return "ball-yellow";
                                else if (n <= 20) return "ball-blue";
                                else if (n <= 30) return "ball-red";
                                else if (n <= 40) return "ball-gray";
                                else return "ball-green";
                            }

                            function makeBallHTML(n){
                                return `<span class="ball ${getBallClass(n)}">${n}</span>`;
                            }

                            function attachCooccurInteractions(){
                            if (COOCCUR_BOUND) return; 
                            COOCCUR_BOUND = true;

                            const table = document.getElementById("cooccur");
                            const info  = document.getElementById("cooccurInfo");
                            if (!table) return;

                            let lastTd = null; 

                            const handlePick = (td) => {
                                if (!td || td.tagName !== "TD") return;
                                if (td === lastTd) return; 
                                lastTd = td;

                                const tr = td.closest("tr");
                                if (!tr) return;

                                const rowHeader = tr.querySelector("th"); 
                                const r = rowHeader ? parseInt(rowHeader.textContent, 10) : null;

                                const c = td.cellIndex; 

                                if (c < 1 || c > 45) return;

                                const v = td.textContent.trim();
                                const together = parseInt(v, 10);

                                clearCooccurSelection();

                                td.classList.add("is-selected");

                                tr.classList.add("is-row-active");
                                if (rowHeader) rowHeader.classList.add("is-row-header-active");

                                table.querySelectorAll(`tbody tr td:nth-child(${c+1})`).forEach(cell => {
                                cell.classList.add("is-col-active");
                                });

                                const colHeader = table.querySelector(`thead tr th:nth-child(${c+1})`);
                                if (colHeader) colHeader.classList.add("is-col-header-active");

                                if (info && Number.isFinite(r) && Number.isFinite(c)) {
                                const diagTd = tr.querySelector(`td.diag-cell`) || tr.querySelector(`td:nth-child(${r+1})`);
                                const total = diagTd ? parseInt(diagTd.textContent, 10) : null;

                                const leftBall  = makeBallHTML(r);
                                const rightBall = makeBallHTML(c);

                                if (Number.isFinite(total)) {
                                info.innerHTML =
                                    `${leftBall} 총 <b>${total}</b>회 출현 중 ` +
                                    `${rightBall} <b>${together}</b>회 동반 출현`;
                                } else {
                                info.innerHTML =
                                    `${leftBall} 숫자와 ${rightBall} 숫자는 <b>${together}</b>회 동반 출현`;
                                }
                                }
                            };

                            table.addEventListener("click", (e) => {
                                const td = e.target.closest("td");
                                handlePick(td);
                            });

                            table.addEventListener("mouseover", (e) => {
                                if ("ontouchstart" in window) return; 
                                const td = e.target.closest("td");
                                if (td) handlePick(td);
                            });

                                const INFO_DEFAULT = info ? info.textContent : "";

                                document.addEventListener("click", (e) => {
                                if (!table.contains(e.target)) {
                                    lastTd = null;
                                    clearCooccurSelection();
                                    if (info) info.textContent = INFO_DEFAULT;  
                                }
                                });
                            }

                            function initRankButtons(){
                            const host = document.getElementById("rankFilter");
                            if (!host) return;

                            if (host.dataset.ready === "1") return;
                            host.dataset.ready = "1";

                            // ✅ "동반 출현 순위" 라벨 추가 (버튼들 맨 앞)
                            const label = document.createElement("span");
                            label.className = "rank-label";
                            label.textContent = "동반 출현 순위";
                            host.appendChild(label);

                            // 1~4 버튼 만들기
                            for (let k = 1; k <= 4; k++){
                                const btn = document.createElement("button");
                                btn.type = "button";
                                btn.className = "rank-btn";
                                btn.textContent = String(k);
                                btn.dataset.rank = String(k);

                                btn.addEventListener("click", () => {
                                const rank = parseInt(btn.dataset.rank, 10);

                                if (ACTIVE_RANK === rank) {
                                    ACTIVE_RANK = 0;
                                } else {
                                    ACTIVE_RANK = rank;
                                }

                                host.querySelectorAll(".rank-btn").forEach(b => {
                                    b.classList.toggle("is-active", parseInt(b.dataset.rank,10) === ACTIVE_RANK);
                                });

                                applyRankFilter();
                                });

                                host.appendChild(btn);
                            }
                            }


                            function applyRankFilter(){
                            const table = document.getElementById("cooccur");
                            if (!table) return;

                            const rows = table.querySelectorAll("tbody tr");
                            if (!rows.length) return;


                            if (!ACTIVE_RANK){
                                table.querySelectorAll("td.cooccur-muted").forEach(td => td.classList.remove("cooccur-muted"));
                                return;
                            }


                            rows.forEach((tr, idx) => {
                                const r = idx + 1;            
                                const tds = tr.querySelectorAll("td"); 

                                tds.forEach(td => td.classList.add("cooccur-muted"));

                                const diag = tds[r - 1];
                                if (diag) diag.classList.remove("cooccur-muted");

                                const vals = [];
                                for (let c = 1; c <= 45; c++){
                                if (c === r) continue;
                                const v = Number(CURRENT_MATRIX?.[r]?.[c] ?? 0);
                                vals.push(v);
                                }

                                const uniqDesc = Array.from(new Set(vals))
                                .filter(v => v > 0)         
                                .sort((a,b) => b-a);

                                const upto = Math.max(1, Math.min(4, ACTIVE_RANK)); // 1~4
                                const allowed = new Set(uniqDesc.slice(0, upto));  // 1등~K등 값들(동점 묶임)

                                if (allowed.size === 0) return;

                                for (let c = 1; c <= 45; c++){
                                if (c === r) continue;
                                const v = Number(CURRENT_MATRIX?.[r]?.[c] ?? 0);
                                if (allowed.has(v)){
                                    const td = tds[c - 1];
                                    if (td) td.classList.remove("cooccur-muted");
                                }
                                }

                            });
                            }



                            </script>

                            /* 랭크 필터 버튼 영역 */

                            display:flex;
                            gap:8px;
                            flex-wrap:wrap;
                            padding: 10px 0 6px;
                            }

                            /* 버튼 토글 느낌 (부트스트랩 쓰면 클래스만으로도 OK) */

                            background:#4e73df;   /* sb-admin-2 primary 느낌 */
                            color:#fff;
                            border-color:#4e73df;
                            }

                            /* 필터로 숨기는 셀: 값은 유지, 화면만 흰색으로 */

                            background-color:#fff !important; /* inline background 덮기 */
