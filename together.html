                                <script>
                                /**
                                * 함께출현 45x45
                                * 행: 기준번호(1~45)
                                * 열: 같이 나온 번호(1~45)
                                * 셀[i][j] = i가 나온 회차들에서 j가 같이 나온 횟수 (i != j)
                                */

                                const API_URL = "/.netlify/functions/get_numbers"; // numbers.json 제공 함수

                                function buildEmptyMatrix() {
                                return Array.from({ length: 46 }, () => Array(46).fill(0));
                                }

                                function extractSixNumbers(item) {
                                const nums = [];
                                for (let k = 1; k <= 6; k++) {
                                    const v = parseInt(item[`number${k}`], 10);
                                    if (!Number.isFinite(v)) return null;
                                    nums.push(v);
                                }
                                return nums;
                                }

                                function computeCooccur(numbersJson) {
                                const M = buildEmptyMatrix();

                                for (const item of numbersJson) {
                                    const nums = extractSixNumbers(item);
                                    if (!nums) continue;

                                    // ✅ 같은 회차에서 (자기 자신 포함) 함께출현 카운트
                                    for (let a = 0; a < nums.length; a++) {
                                    const rowNum = nums[a];
                                    for (let b = 0; b < nums.length; b++) {
                                        const colNum = nums[b];
                                        M[rowNum][colNum] += 1;  // ← a===b(대각선)도 +1
                                    }
                                    }
                                }

                                return M;
                                }

                                function renderCooccurTable(matrix) {
                                const container = document.getElementById("cooccur");
                                if (!container) return;

                                // 기존 테이블 내용 초기화
                                container.innerHTML = "";

                                const thead = document.createElement("thead");
                                const tbody = document.createElement("tbody");

                                // 헤더 row
                                const trHead = document.createElement("tr");

                                // 1행1열 제목
                                const thCorner = document.createElement("th");
                                thCorner.textContent = "↓번호/동시출현번호→";
                                trHead.appendChild(thCorner);

                                // 열 헤더 1~45
                                for (let c = 1; c <= 45; c++) {
                                    const th = document.createElement("th");
                                    th.textContent = c;
                                    trHead.appendChild(th);
                                }
                                thead.appendChild(trHead);

                                // 본문: 행 1~45
                                for (let r = 1; r <= 45; r++) {
                                    const tr = document.createElement("tr");

                                    // 행 이름(첫 컬럼)
                                    const thRow = document.createElement("th");
                                    thRow.textContent = r;
                                    tr.appendChild(thRow);

                                    // 45칸
                                    for (let c = 1; c <= 45; c++) {
                                    const td = document.createElement("td");
                                    td.textContent = matrix[r][c]; // 자기자신 포함해도 0
                                    tr.appendChild(td);
                                    }

                                    tbody.appendChild(tr);
                                }

                                container.appendChild(thead);
                                container.appendChild(tbody);

                                // DataTables 적용(이미 프로젝트에 jQuery/DataTables가 있다는 전제)
                                // 45열이라 가로스크롤 권장
                                if ($.fn.DataTable.isDataTable("#cooccur")) {
                                    $("#cooccur").DataTable().clear().destroy();
                                }

                                $("#cooccur").DataTable({
                                    paging: false,
                                    searching: false,
                                    info: false,
                                    order: [],
                                    autoWidth: false,
                                    responsive: false,
                                    scrollX: true,
                                    scrollCollapse: true,
                                });
                                }

                                async function initCooccur() {
                                try {
                                    const res = await fetch(API_URL, { cache: "no-store" });
                                    if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
                                    const json = await res.json();

                                    const matrix = computeCooccur(json);
                                    renderCooccurTable(matrix);
                                } catch (err) {
                                    console.error(err);
                                    const container = document.getElementById("cooccur");
                                    if (container) container.innerHTML = `<tbody><tr><td>데이터 로드 실패: ${String(err)}</td></tr></tbody>`;
                                }
                                }

                                document.addEventListener("DOMContentLoaded", initCooccur);
                                </script>
                                <style>
                                /* 첫 열(행번호)과 헤더를 좀 더 "표처럼" 보이게 */
                                #cooccur th, #cooccur td {
                                    text-align: center;
                                    vertical-align: middle;
                                    white-space: nowrap;
                                }

                                /* DataTables scrollX 사용 시 헤더/첫열 고정 느낌 주고 싶으면 sticky 사용 */
                                #cooccur thead th {
                                    position: sticky;
                                    top: 0;
                                    z-index: 3;
                                    background: #f8f9fc;
                                }

                                #cooccur tbody th {

                                    left: 0;
                                    z-index: 2;
                                    background: #fff;
                                }

                                /* 좌상단 코너 셀 */

                                    position: sticky;

                                <script>
                                function getRoundRange() {
                                    const start = parseInt(document.getElementById("round_range_start").value) || 1;
                                    const end = parseInt(document.getElementById("round_range_end").value) || Infinity;
                                    return { start, end };
                                }
                                
                                function getTableData(start, end, includeBonus = false) {
                                const table = document.getElementById("dataTable-1");
                                const rows = table.querySelectorAll("tbody tr");
                                const numbers = [];

                                for (const row of rows) {
                                    const roundNumber = parseInt(row.querySelector("td:first-child").textContent);

                                    if (roundNumber >= start && roundNumber <= end) {
                                    const rowData = row.querySelectorAll("td");

                                    // 일반번호 6개: td index 2~7
                                    for (let i = 2; i <= 7; i++) {
                                        numbers.push(parseInt(rowData[i].textContent));
                                    }

                                    // 보너스 포함 td index 8 추가
                                    if (includeBonus) {
                                        const bonusTd = row.querySelector("td.bonus");
                                        if (bonusTd) numbers.push(parseInt(bonusTd.textContent));
                                    }
                                    }
                                }

                                return numbers;
                                }

                                function addRanks(statsSortedDesc) {
                                let previousRank = 0;
                                let previousCount = -1;

                                return statsSortedDesc.map((s, index) => {
                                    let rank;
                                    if (s.count === previousCount) {
                                    rank = previousRank;
                                    } else {
                                    rank = index + 1;
                                    previousRank = rank;
                                    }
                                    previousCount = s.count;
                                    return { ...s, rank };
                                });
                                }
                                
                                  function calculateStats(numbers) {
                                    const counts = Array(45).fill(0);
                                
                                    for (const number of numbers) {
                                      counts[number - 1]++;
                                    }
                                
                                    const stats = counts.map((count, index) => ({ number: index + 1, count })).sort((a, b) => b.count - a.count);
                                    return stats;
                                  }
                                
                                    function displayStats(statsNoBonus, statsWithBonus) {
                                    const existingTable = document.getElementById("statsTable");
                                    if (existingTable) existingTable.remove();

                                    const statsContainer = document.getElementById("stats");
                                    const table = document.createElement("table");
                                    table.id = "statsTable";
                                    table.style.width = "100%";

                                    const thead = document.createElement("thead");
                                    const tbody = document.createElement("tbody");
                                    const headerRow = document.createElement("tr");

                                    const headers = [
                                        ["번호", ""],
                                        ["출현 횟수", "보너스 미포함"],
                                        ["순위", "보너스 미포함"],
                                        ["출현 횟수", "보너스 포함"],
                                        ["순위", "보너스 포함"]
                                        ];

                                        headers.forEach(([line1, line2]) => {
                                        const th = document.createElement("th");


                                        th.appendChild(document.createTextNode(line1));


                                        if (line2) {
                                            th.appendChild(document.createElement("br"));

                                            const small = document.createElement("small");
                                            small.textContent = `(${line2})`;
                                            th.appendChild(small);
                                        }

                                        headerRow.appendChild(th);
                                        });

                                    thead.appendChild(headerRow);
                                    table.appendChild(thead);

                                    const rankedNoBonus = addRanks(statsNoBonus);
                                    const rankedWithBonus = addRanks(statsWithBonus);

                                    const mapNoBonus = new Map(rankedNoBonus.map((s) => [s.number, s]));
                                    const mapWithBonus = new Map(rankedWithBonus.map((s) => [s.number, s]));

                                    for (let num = 1; num <= 45; num++) {
                                        const a = mapNoBonus.get(num) || { count: 0, rank: "-" };
                                        const b = mapWithBonus.get(num) || { count: 0, rank: "-" };

                                        const tr = document.createElement("tr");

                                        const tdNum = document.createElement("td");

                                        // 동그라미(공)
                                        const ball = document.createElement("span");
                                        ball.classList.add("num-ball");
                                        ball.textContent = num;

                                        if (num <= 10) ball.style.backgroundColor = "#f1c40f";       // 노란색
                                        else if (num <= 20) ball.style.backgroundColor = "#3498db";  // 파란색
                                        else if (num <= 30) ball.style.backgroundColor = "#e74c3c";  // 빨간색
                                        else if (num <= 40) ball.style.backgroundColor = "#7f8c8d";  // 회색
                                        else ball.style.backgroundColor = "#2ecc71";                 // 초록색

                                        tdNum.appendChild(ball); // 초록색

                                        const tdCount = document.createElement("td");
                                        tdCount.textContent = a.count;

                                        const tdRank = document.createElement("td");
                                        tdRank.textContent = a.rank;

                                        const tdCountB = document.createElement("td");
                                        tdCountB.textContent = b.count;

                                        const tdRankB = document.createElement("td");
                                        tdRankB.textContent = b.rank;

                                        tr.appendChild(tdNum);
                                        tr.appendChild(tdCount);
                                        tr.appendChild(tdRank);
                                        tr.appendChild(tdCountB);
                                        tr.appendChild(tdRankB);

                                        tbody.appendChild(tr);
                                    }

                                    table.appendChild(tbody);
                                    statsContainer.appendChild(table);

                                    $("#statsTable").DataTable({
                                    paging: false,
                                    searching: false,
                                    info: false,
                                    order: [],
                                    autoWidth: false,
                                    responsive: true
                                    });
                                    }


                                document.addEventListener("DOMContentLoaded", () => {
                                    const { start, end } = getRoundRange();

                                    const numbersNoBonus = getTableData(start, end, false);
                                    const numbersWithBonus = getTableData(start, end, true);

                                    const statsNoBonus = calculateStats(numbersNoBonus);
                                    const statsWithBonus = calculateStats(numbersWithBonus);

                                    displayStats(statsNoBonus, statsWithBonus);
                                    });

                                document.getElementById("calculateStatsButton").addEventListener("click", () => {
                                    const { start, end } = getRoundRange();

                                    const numbersNoBonus = getTableData(start, end, false);
                                    const numbersWithBonus = getTableData(start, end, true);

                                    const statsNoBonus = calculateStats(numbersNoBonus);
                                    const statsWithBonus = calculateStats(numbersWithBonus);

                                    displayStats(statsNoBonus, statsWithBonus);
                                    });

                                </script>

                                </div>
                            </div>

                        <script>
                        document.addEventListener("DOMContentLoaded", function () {
                            const sourceTable = document.getElementById("dataTable-1");
                            const targetTable = document.getElementById("stats2");
                            const roundRangeStartSelect = document.getElementById("round_range_start");
                            const roundRangeEndSelect = document.getElementById("round_range_end");
                            const calculateStatsButton = document.getElementById("calculateStatsButton");
                        
                            for (let i = 1; i < sourceTable.rows.length; i++) {
                                const option = document.createElement("option");
                                option.value = i;
                                option.innerText = i;
                                roundRangeStartSelect.appendChild(option.cloneNode(true));
                                roundRangeEndSelect.appendChild(option);
                            }
                        
                            const initialRangeStart = 1;
                            const initialRangeEnd = sourceTable.rows.length - 1;
                            roundRangeStartSelect.value = initialRangeStart;
                            roundRangeEndSelect.value = initialRangeEnd;
                        

                            updateStats(initialRangeStart, initialRangeEnd);
                        
                            calculateStatsButton.addEventListener("click", function () {
                                const rangeStart = parseInt(roundRangeStartSelect.value);
                                const rangeEnd = parseInt(roundRangeEndSelect.value);
                                updateStats(rangeStart, rangeEnd);
                            });
                        
                            function updateStats(rangeStart, rangeEnd) {
                                if ($.fn.DataTable.isDataTable('#stats2')) {
                                    $('#stats2').DataTable().clear().destroy();
                                }
                        
                                const targetTableBody = targetTable.getElementsByTagName("tbody")[0] || targetTable.createTBody();
                                while (targetTableBody.rows.length > 0) {
                                    targetTableBody.deleteRow(0);
                                }
                    
                            }
                            function drawChart(data, labels) {
                                const ctx = document.getElementById("sum_range_chart").getContext("2d");

                                if (window.myBarChart) {
                                    window.myBarChart.destroy();
                                }

                                window.myBarChart = new Chart(ctx, {
                                    type: "bar",
                                    data: {
                                        labels: labels,
                                        datasets: [
                                        {
                                            label: "회차별 번호 총합 분포",
                                            data: data,
                                            backgroundColor: "rgba(75, 192, 192, 0.2)",
                                            borderColor: "rgba(75, 192, 192, 1)",
                                            borderWidth: 1,
                                        },
                                        ],
                                    },
                                    options: {
                                        scales: {
                                            y: {
                                                beginAtZero: true,
                                            },
                                        },
                                    },
                                });
                            }
                        });
                        </script>
