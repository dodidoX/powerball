                        <p>조회하고 싶은 회차 범위를 입력하세요
                            <select id="round_range_start"></select> ~

                                </div>

                                    <table class="table" id="cooccur" width="100%"></table> <!-- 여기에 출력-->

                                <script> /* 테이블 생성 */
                                const API_URL = "/.netlify/functions/get_numbers"; /* coincidence */

                                function setSelectOptions(selectEl, min, max) {
                                selectEl.innerHTML = "";
                                for (let i = min; i <= max; i++) {
                                    const opt = document.createElement("option");
                                    opt.value = String(i);
                                    opt.textContent = String(i);
                                    selectEl.appendChild(opt);
                                }
                                }

                                function renderCooccurTable(matrix) {
                                const table = document.getElementById("cooccur");
                                if (!table) return;

                                table.innerHTML = "";

                                const thead = document.createElement("thead");
                                const tbody = document.createElement("tbody");

                                // 헤더
                                const trHead = document.createElement("tr");
                                const thCorner = document.createElement("th");
                                thCorner.textContent = "↓번호/동시출현번호→";
                                trHead.appendChild(thCorner);

                                for (let c = 1; c <= 45; c++) {
                                    const th = document.createElement("th");
                                    th.textContent = c;
                                    trHead.appendChild(th);
                                }
                                thead.appendChild(trHead);

                                // 바디
                                for (let r = 1; r <= 45; r++) {
                                    const tr = document.createElement("tr");

                                    const thRow = document.createElement("th");
                                    thRow.textContent = r;
                                    tr.appendChild(thRow);

                                    for (let c = 1; c <= 45; c++) {
                                    const td = document.createElement("td");
                                    td.textContent = matrix?.[r]?.[c] ?? 0;
                                    tr.appendChild(td);
                                    }
                                    tbody.appendChild(tr);
                                }

                                table.appendChild(thead);
                                table.appendChild(tbody);

                                // DataTables 재초기화
                                if ($.fn.DataTable.isDataTable("#cooccur")) {
                                    $("#cooccur").DataTable().clear().destroy();
                                }

                                $("#cooccur").DataTable({
                                    paging: false,
                                    searching: false,
                                    info: false,
                                    order: [],
                                    autoWidth: false,
                                    responsive: false,
                                    scrollX: true,
                                    scrollCollapse: true,
                                });
                                }

                                async function fetchMatrix(start, end) {
                                const url = `${API_BASE}?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
                                const res = await fetch(url, { cache: "no-store" });
                                if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
                                return await res.json(); // { meta, matrix }
                                }

                                function clampAndSwap(s, e, minRound, maxRound) {
                                let start = parseInt(s, 10);
                                let end = parseInt(e, 10);

                                if (!Number.isFinite(start)) start = minRound;
                                if (!Number.isFinite(end)) end = maxRound;

                                // 범위 보정
                                if (start < minRound) start = minRound;
                                if (start > maxRound) start = maxRound;

                                if (end < minRound) end = minRound;
                                if (end > maxRound) end = maxRound;

                                // start > end이면 스왑
                                if (end < start) [start, end] = [end, start];

                                return { start, end };
                                }

                                async function initRoundSelectorsAndTable() {
                                const startSel = document.getElementById("round_range_start");
                                const endSel = document.getElementById("round_range_end");
                                const btn = document.getElementById("calculateStatsButton");
                                if (!startSel || !endSel || !btn) return;

                                try {
                                    // ✅ 1) 전체 범위 메타 + 전체 matrix(초기 화면)
                                    const initData = await fetchMatrix(1, 9999999);
                                    const { minRound, maxRound } = initData.meta;

                                    // ✅ 2) 드롭다운 채우기
                                    setSelectOptions(startSel, minRound, maxRound);
                                    setSelectOptions(endSel, minRound, maxRound);

                                    // 기본값: 전체
                                    startSel.value = String(minRound);
                                    endSel.value = String(maxRound);

                                    // ✅ 3) 표 렌더
                                    renderCooccurTable(initData.matrix);

                                    // ✅ 4) 버튼 클릭: 선택 구간 재조회
                                    btn.addEventListener("click", async () => {
                                    const { start, end } = clampAndSwap(startSel.value, endSel.value, minRound, maxRound);

                                    // UI 반영(스왑/클램프된 값 표시)
                                    startSel.value = String(start);
                                    endSel.value = String(end);

                                    btn.disabled = true;
                                    const originalText = btn.textContent;
                                    btn.textContent = "조회중...";

                                    try {
                                        const d = await fetchMatrix(start, end);
                                        renderCooccurTable(d.matrix);
                                    } catch (err) {
                                        console.error(err);
                                        alert(`조회 실패: ${String(err)}`);
                                    } finally {
                                        btn.disabled = false;
                                        btn.textContent = originalText;
                                    }
                                    });

                                } catch (err) {
                                    console.error(err);
                                    alert(`초기화 실패: ${String(err)}`);
                                }
                                }

                                document.addEventListener("DOMContentLoaded", initRoundSelectorsAndTable);
                                </script>
