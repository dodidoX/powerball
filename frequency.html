                        해당 데이터를 활용해서 <a class="collapse-item" href="numbers_generator.html"><strong><u>번호 생성 페이지</u></strong></a>에서 번호를 생성해보세요</p>

                                <script>

                                const API_BASE = "/.netlify/functions/count_numbers";

                                let CACHE = null;
                                let MIN_ROUND = 1;
                                let MAX_ROUND = 1;


                                /* 드롭다운 채우기 */
                                function setSelectOptions(selectEl, min, max) {

                                    selectEl.innerHTML = "";

                                    for (let i = min; i <= max; i++) {

                                        const opt = document.createElement("option");

                                        opt.value = i;
                                        opt.textContent = i;

                                        selectEl.appendChild(opt);

                                    }

                                }

                                async function fetchNumbers(start, end) {

                                    const url = `${API_BASE}?start=${start}&end=${end}`;

                                    const res = await fetch(url, { cache: "no-store" });

                                    if (!res.ok)
                                        throw new Error(`fetch failed: ${res.status}`);

                                    return await res.json();

                                }


                                function calculateStats(numbersArray, includeBonus) {

                                    const counts = Array(45).fill(0);

                                    for (const item of numbersArray) {

                                        for (let i = 1; i <= 6; i++) {

                                            const num = parseInt(item[`number${i}`]);

                                            if (num >= 1 && num <= 45)
                                                counts[num - 1]++;

                                        }

                                        if (includeBonus) {

                                            const b = parseInt(item.bonus);

                                            if (b >= 1 && b <= 45)
                                                counts[b - 1]++;

                                        }

                                    }

                                    return counts.map((count, index) => ({
                                        number: index + 1,
                                        count
                                    }))
                                    .sort((a, b) => b.count - a.count);

                                }


                                function addRanks(stats) {

                                    let prevCount = -1;
                                    let prevRank = 0;

                                    return stats.map((row, i) => {

                                        if (row.count === prevCount)
                                            row.rank = prevRank;

                                        else {

                                            row.rank = i + 1;
                                            prevRank = row.rank;
                                            prevCount = row.count;

                                        }

                                        return row;

                                    });

                                }


                                function renderTable(statsNoBonus, statsBonus) {
                                const table = document.getElementById("stats");

                                if ($.fn.DataTable.isDataTable("#stats")) {
                                    $("#stats").DataTable().clear().destroy();
                                }

                                table.innerHTML = "";

                                const thead = document.createElement("thead");
                                const tbody = document.createElement("tbody");

                                const headers = [
                                    "번호",
                                    "출현 횟수(보너스 미포함)",
                                    "순위",
                                    "출현 횟수(보너스 포함)",
                                    "순위"
                                ];

                                const trHead = document.createElement("tr");
                                headers.forEach(h => {
                                    const th = document.createElement("th");
                                    th.textContent = h;
                                    trHead.appendChild(th);
                                });
                                thead.appendChild(trHead);

                                const mapA = new Map(statsNoBonus.map(x => [x.number, x]));
                                const mapB = new Map(statsBonus.map(x => [x.number, x]));

                                for (let i = 1; i <= 45; i++) {
                                    const a = mapA.get(i);
                                    const b = mapB.get(i);

                                    let ballClass;
                                    if (i <= 10) ballClass = "ball-yellow";
                                    else if (i <= 20) ballClass = "ball-blue";
                                    else if (i <= 30) ballClass = "ball-red";
                                    else if (i <= 40) ballClass = "ball-gray";
                                    else ballClass = "ball-green";

                                    const tr = document.createElement("tr");
                                    tr.innerHTML = `
                                    <td><span class="num-ball ${ballClass}">${i}</span></td>
                                    <td>${a.count}</td>
                                    <td>${a.rank}</td>
                                    <td>${b.count}</td>
                                    <td>${b.rank}</td>
                                    `;
                                    tbody.appendChild(tr);
                                }

                                table.appendChild(thead);
                                table.appendChild(tbody);

                                $("#stats").DataTable({
                                    paging: false,
                                    searching: false,
                                    info: false,
                                    order: [],
                                    autoWidth: false  
                                });
                                }


                                async function runQuery() {

                                    const start = parseInt(
                                        document.getElementById("round_range_start").value
                                    );

                                    const end = parseInt(
                                        document.getElementById("round_range_end").value
                                    );

                                    const data = await fetchNumbers(start, end);

                                    const numbers = data.numbers;

                                    const statsA = addRanks(
                                        calculateStats(numbers, false)
                                    );

                                    const statsB = addRanks(
                                        calculateStats(numbers, true)
                                    );

                                    renderTable(statsA, statsB);

                                }


                                async function init() {

                                    const data = await fetchNumbers(1, 999999);

                                    MIN_ROUND = data.meta.minRound;
                                    MAX_ROUND = data.meta.maxRound;

                                    const startSel =
                                        document.getElementById("round_range_start");

                                    const endSel =
                                        document.getElementById("round_range_end");

                                    setSelectOptions(startSel, MIN_ROUND, MAX_ROUND);
                                    setSelectOptions(endSel, MIN_ROUND, MAX_ROUND);

                                    startSel.value = MIN_ROUND;
                                    endSel.value = MAX_ROUND;

                                    await runQuery();

                                }


                                document.addEventListener("DOMContentLoaded", init);

                                document
                                .getElementById("calculateStatsButton")
                                .addEventListener("click", runQuery);

                                </script>
